name: Release

# Reusable: release-please (semver from Conventional Commits). Called by ci.yml.
# yamllint disable-line rule:truthy
on:
  workflow_call:
    outputs:
      released:
        description: "true when release-please cut a release this run"
        value: ${{ jobs.release-please.outputs.released }}

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      released: ${{ steps.rp.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          # Use a PAT/App token (not the default GITHUB_TOKEN): GitHub does not
          # trigger workflows from GITHUB_TOKEN-authored events, so the release
          # PR would get no CI and merging it would not cut the release.
          # Create a fine-grained PAT secret RELEASE_PLEASE_TOKEN (Contents +
          # Pull requests: write). Falls back to GITHUB_TOKEN if unset.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
