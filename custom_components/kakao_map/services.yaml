search_place:
  fields:
    query:
      required: true
      example: "판교 스타벅스"
      selector:
        text:

get_directions:
  fields:
    origin:
      required: true
      example: "{latitude: 37.5665, longitude: 126.978}"
      selector:
        location:
          radius: false
    destination:
      required: true
      example: "{latitude: 37.3945, longitude: 127.1112}"
      selector:
        location:
          radius: false
    waypoints:
      example: "[zone.office, {latitude: 37.39, longitude: 127.11}]"
      selector:
        entity:
          multiple: true
    mode:
      default: car
      selector:
        select:
          translation_key: mode
          options:
            - car
            - traffic
            - walk
            - bicycle

patch_map:

restore_map:
